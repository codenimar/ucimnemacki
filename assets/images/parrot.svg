<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="60" fill="#7C3AED"/>
  <!-- Wing left -->
  <ellipse cx="56" cy="125" rx="22" ry="42" fill="#6D28D9" transform="rotate(-15 56 125)"/>
  <!-- Wing right -->
  <ellipse cx="144" cy="125" rx="22" ry="42" fill="#6D28D9" transform="rotate(15 144 125)"/>
  <!-- Belly -->
  <ellipse cx="100" cy="130" rx="30" ry="38" fill="#A78BFA"/>
  <!-- Head -->
  <circle cx="100" cy="68" r="38" fill="#7C3AED"/>
  <!-- Head accent (forehead) -->
  <ellipse cx="100" cy="52" rx="22" ry="16" fill="#8B5CF6"/>
  <!-- Crest feathers -->
  <ellipse cx="88"  cy="33" rx="6" ry="14" fill="#5B21B6" transform="rotate(-20 88 33)"/>
  <ellipse cx="100" cy="30" rx="6" ry="16" fill="#4C1D95"/>
  <ellipse cx="112" cy="33" rx="6" ry="14" fill="#5B21B6" transform="rotate(20 112 33)"/>
  <!-- Crest tips -->
  <circle cx="84"  cy="22" r="5" fill="#F59E0B"/>
  <circle cx="100" cy="18" r="5" fill="#FBBF24"/>
  <circle cx="116" cy="22" r="5" fill="#F59E0B"/>
  <!-- Eye white left -->
  <circle cx="84" cy="67" r="12" fill="white"/>
  <!-- Eye white right -->
  <circle cx="116" cy="67" r="12" fill="white"/>
  <!-- Eye pupil left -->
  <circle cx="86" cy="67" r="8" fill="#1F2937"/>
  <!-- Eye pupil right -->
  <circle cx="118" cy="67" r="8" fill="#1F2937"/>
  <!-- Eye shine left -->
  <circle cx="89" cy="64" r="3" fill="white"/>
  <!-- Eye shine right -->
  <circle cx="121" cy="64" r="3" fill="white"/>
  <!-- Eye coloured ring left -->
  <circle cx="84" cy="67" r="12" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <!-- Eye coloured ring right -->
  <circle cx="116" cy="67" r="12" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <!-- Beak upper -->
  <path d="M93 80 Q100 96 107 80 Q100 76 93 80Z" fill="#F59E0B"/>
  <!-- Beak lower -->
  <path d="M94 83 Q100 92 106 83 Q100 90 94 83Z" fill="#D97706"/>
  <!-- Blush cheeks -->
  <ellipse cx="74"  cy="78" rx="9" ry="6" fill="#EC4899" opacity=".4"/>
  <ellipse cx="126" cy="78" rx="9" ry="6" fill="#EC4899" opacity=".4"/>
  <!-- Feet -->
  <g fill="#F59E0B">
    <rect x="82" y="173" width="8" height="14" rx="4"/>
    <rect x="110" y="173" width="8" height="14" rx="4"/>
    <rect x="74" y="180" width="8" height="6" rx="3"/>
    <rect x="88" y="182" width="8" height="6" rx="3"/>
    <rect x="102" y="182" width="8" height="6" rx="3"/>
    <rect x="116" y="180" width="8" height="6" rx="3"/>
  </g>
  <!-- Tail feathers -->
  <ellipse cx="90"  cy="176" rx="10" ry="20" fill="#5B21B6" transform="rotate(-20 90 176)"/>
  <ellipse cx="100" cy="178" rx="10" ry="22" fill="#4C1D95"/>
  <ellipse cx="110" cy="176" rx="10" ry="20" fill="#5B21B6" transform="rotate(20 110 176)"/>
</svg>
